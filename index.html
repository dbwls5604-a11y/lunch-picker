<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오늘 뭐 먹지?</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css');
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

:root{
  --bg1:#FF8FAE;
  --bg2:#FF5C82;
  --bg3:#FF7A45;
  --paper:#FFFFFF;
  --paper-dark:#FFF1F4;
  --ink:#2E1F33;
  --ink-soft:#9086A0;
  --line: rgba(46,31,51,0.09);
  --red:#FF3B6E;
  --mustard:#FFC93C;
  --pine:#2FD68C;
  --navy:#4D8AFF;
  --brown:#FF8A3D;
  --teal:#2FE0C2;
  --plum:#B15DFF;
  --slate:#FF6FA0;
}
*{ box-sizing:border-box; }
body{
  margin:0;
  padding:32px 16px 60px;
  min-height:100vh;
  background:
    radial-gradient(circle at 85% 8%, rgba(255,255,255,0.35), transparent 40%),
    radial-gradient(circle at 8% 85%, rgba(255,255,255,0.25), transparent 45%),
    linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
  background-attachment:fixed;
  font-family:'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
  color:var(--ink);
  display:flex;
  justify-content:center;
}
.board{ width:100%; max-width:460px; }
.card{
  background:var(--paper);
  box-shadow: 0 2px 0 rgba(255,255,255,0.6) inset, 0 18px 36px -14px rgba(120,10,50,0.4);
  border-radius:26px;
  padding:26px 24px;
  position:relative;
  margin-bottom:16px;
}
.card.tilt-a, .card.tilt-b{ transform:none; }

.eyebrow{
  font-size:12px; color:var(--ink-soft); font-weight:600;
  display:flex; justify-content:space-between; margin-bottom:12px;
}
.header-icon{
  width:52px; height:52px; border-radius:18px;
  background:linear-gradient(135deg, var(--red), var(--brown));
  color:#fff; display:flex; align-items:center; justify-content:center;
  margin-bottom:14px; transform:rotate(-6deg);
  box-shadow:0 10px 20px -8px rgba(255,59,110,0.6);
}
h1{
  font-family:'Jua', sans-serif; font-weight:400; font-size:30px;
  letter-spacing:-0.01em; margin:0 0 8px; color:var(--red);
}
.sub{ font-size:14px; color:var(--ink-soft); margin-bottom:20px; line-height:1.6; font-weight:500; }
.perf{ border:none; border-top:2px dashed var(--line); margin:20px 0; }

.group-label{
  font-size:12px; letter-spacing:0.02em; font-weight:800;
  text-transform:uppercase; color:var(--red); margin-bottom:10px;
  display:flex; align-items:center;
}
.chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.chip{
  font-size:13px; font-weight:700; padding:8px 15px;
  border:2px solid var(--catcolor,var(--line)); border-radius:999px; background:#fff;
  cursor:pointer; color:var(--catcolor,var(--ink-soft)); transition:all .15s ease; user-select:none;
}
.chip.cat-active{ background:var(--catcolor,var(--ink)); color:#fff; box-shadow:0 6px 14px -6px rgba(0,0,0,0.4); transform:translateY(-1px); }

.toggle-row{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:18px; font-size:13.5px; font-weight:600;
}
.switch{
  position:relative; width:46px; height:27px; border:none;
  border-radius:999px; cursor:pointer; flex-shrink:0; background:var(--paper-dark); transition:background .2s ease;
}
.switch::after{
  content:''; position:absolute; top:3px; left:3px; width:21px; height:21px;
  border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(46,31,51,0.35); transition:transform .2s ease;
}
.switch.on::after{ transform:translateX(19px); }
.switch.on{ background:var(--pine); }

.tabs{ display:flex; gap:4px; margin-bottom:18px; background:var(--paper-dark); padding:5px; border-radius:16px; }
.tab{
  flex:1; text-align:center; font-size:13.5px;
  font-weight:800; padding:10px 6px; border:none; border-radius:12px;
  background:transparent; color:var(--ink-soft); cursor:pointer; transition:all .15s ease;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.tab.active{ background:linear-gradient(135deg, var(--red), var(--brown)); color:#fff; box-shadow:0 6px 14px -6px rgba(255,59,110,0.6); }
.panel{ display:none; }
.panel.active{ display:block; }

.draw-btn{
  width:100%; font-family:'Jua', sans-serif; font-weight:400; font-size:19px;
  padding:16px; background:linear-gradient(180deg, #FF6084, var(--red));
  color:#fff; border:none; border-radius:18px; cursor:pointer;
  box-shadow:0 6px 0 #C9264F; transition:transform .1s ease, box-shadow .1s ease;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.draw-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #C9264F; }
.draw-btn:disabled{ opacity:0.5; box-shadow:none; cursor:default; }

.result-wrap{ max-height:0; overflow:hidden; transition:max-height .5s ease; }
.result-wrap.show{ max-height:340px; }
.result{
  margin-top:20px; padding-top:20px; border-top:2px dashed var(--line);
  text-align:center; position:relative;
}
.result-label{ font-size:12px; font-weight:800; color:var(--red); margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:6px; }
.result-name{ font-family:'Jua', sans-serif; font-weight:400; font-size:27px; min-height:34px; color:var(--ink); }
.result-meta{ font-size:13px; color:var(--ink-soft); margin-top:8px; line-height:1.6; font-weight:600; }
.stamp{
  display:inline-block; margin-top:14px; padding:7px 16px; background:var(--pine);
  color:#fff; font-weight:800; font-size:12px;
  border-radius:999px; transform:scale(0.7) rotate(-4deg);
  opacity:0; transition:transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s ease;
  box-shadow:0 6px 14px -6px rgba(47,214,140,0.6);
}
.stamp.show{ transform:scale(1) rotate(-4deg); opacity:1; }
.reroll{
  margin-top:0; background:var(--paper-dark); border:none;
  font-size:12.5px; font-weight:700; color:var(--ink-soft); border-radius:999px; padding:8px 14px; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
}
.result-actions{
  display:flex; gap:10px; justify-content:center; align-items:center;
  flex-wrap:wrap; margin-top:14px;
}
.slack-btn{
  font-size:12.5px; font-weight:700; padding:8px 14px;
  border:none; border-radius:999px; background:var(--navy);
  color:#fff; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
}
.slack-btn:disabled{ opacity:0.5; cursor:default; }
.slack-status{ font-size:12px; color:var(--ink-soft); margin-top:8px; min-height:14px; font-weight:600; }

.list-toggle{
  display:flex; width:100%; text-align:center; background:none; border:none;
  font-size:13px; font-weight:700; color:var(--navy);
  cursor:pointer; margin-top:16px; align-items:center; justify-content:center; gap:6px;
}
.list-view{ margin-top:10px; max-height:0; overflow:hidden; transition:max-height .4s ease; }
.list-view.show{ max-height:400px; overflow-y:auto; }
.list-row{
  display:flex; justify-content:space-between; align-items:center; gap:8px;
  font-size:13px; padding:10px 0; border-bottom:1px dashed var(--line);
}
.list-row:last-child{ border-bottom:none; }
.list-row-main{ flex:1; min-width:0; }
.list-row-name{ font-weight:800; color:var(--ink); }
.list-row-meta{ color:var(--ink-soft); font-size:12px; margin-top:2px; font-weight:500; }
.pick-btn{
  font-size:11.5px; font-weight:700; padding:6px 12px;
  border:none; border-radius:999px; background:var(--paper-dark); color:var(--red);
  cursor:pointer; flex-shrink:0; display:inline-flex; align-items:center; gap:4px;
}

.wheel-area{ text-align:center; }
.wheel-note{ font-size:12.5px; color:var(--ink-soft); margin-bottom:16px; font-weight:600; }
.wheel-wrap{ position:relative; width:260px; height:260px; margin:0 auto 20px; }
.pointer{
  position:absolute; top:-6px; left:50%; transform:translateX(-50%);
  width:0; height:0; border-left:11px solid transparent; border-right:11px solid transparent;
  border-top:18px solid var(--mustard); z-index:3; filter:drop-shadow(0 3px 4px rgba(46,31,51,0.35));
}
.wheel{
  width:100%; height:100%; border-radius:50%; position:relative;
  border:8px solid #fff; box-shadow:0 0 0 3px var(--red), 0 20px 36px -14px rgba(120,10,50,0.5);
  transition:transform 4s cubic-bezier(.13,.71,.13,1);
  overflow:hidden;
}
.wheel-hub{
  position:absolute; top:50%; left:50%; width:38px; height:38px; margin:-19px 0 0 -19px;
  border-radius:50%; background:#fff; box-shadow:0 3px 10px rgba(46,31,51,0.3); z-index:2;
  border:3px solid var(--mustard);
}
.wheel-label{ position:absolute; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
.wheel-label span{
  display:inline-block; color:#fff;
  font-weight:800; white-space:nowrap;
  text-shadow:0 1px 3px rgba(0,0,0,0.5);
}

.history h2, .manage h2{
  font-size:15px; font-weight:800;
  margin:0 0 14px; display:flex; justify-content:space-between; align-items:center; color:var(--red);
}
.clear-btn, .toggle-link{
  font-size:12.5px; font-weight:700; color:var(--navy);
  background:none; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
}
.hist-row{
  display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:9px 0;
  border-bottom:1px dashed var(--line); gap:8px;
}
.hist-row:last-child{ border-bottom:none; }
.hist-main{ display:flex; align-items:center; gap:0; min-width:0; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700; }
.hist-date{ color:var(--ink-soft); flex-shrink:0; font-weight:500; }
.hist-tag{ font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:999px; color:#fff; margin-left:8px; flex-shrink:0; }
.hist-del{
  font-size:14px; color:var(--ink-soft); background:none; border:none; cursor:pointer;
  flex-shrink:0; line-height:1; padding:5px; border-radius:50%; transition:background .15s ease, color .15s ease;
  display:inline-flex; align-items:center; justify-content:center;
}
.hist-del:hover{ color:var(--red); background:var(--paper-dark); }
.empty{ font-size:13px; color:var(--ink-soft); text-align:center; padding:12px 0; font-weight:600; }

.manage-toggle{ text-align:center; }
.manage-body{ margin-top:16px; }
.form-row{ display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.form-row input{
  font-size:13px; padding:10px 12px; font-weight:600;
  border:2px solid var(--line); border-radius:12px; background:var(--paper);
  color:var(--ink); flex:1; min-width:80px; transition:border-color .15s ease;
}
.form-row input:focus{ outline:none; border-color:var(--red); }
.form-row input::placeholder{ color:#C7BFD0; font-weight:500; }
.add-btn{
  width:100%; font-weight:800; font-size:14px;
  padding:12px; background:var(--pine);
  color:#fff; border:none; border-radius:14px; cursor:pointer; margin-bottom:16px; transition:transform .1s ease;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 5px 0 #1FA36B;
}
.add-btn:active{ transform:translateY(3px); box-shadow:0 2px 0 #1FA36B; }
.manage-list{ max-height:280px; overflow-y:auto; }
.manage-row{
  display:flex; justify-content:space-between; align-items:center; gap:8px;
  font-size:12.5px; padding:9px 0; border-bottom:1px dashed var(--line);
}
.manage-row-main{ min-width:0; font-weight:600; }
.manage-row-meta{ color:var(--ink-soft); font-size:11.5px; margin-top:2px; font-weight:500; }
.del-btn{
  font-size:15px; color:var(--ink-soft); background:none; border:none; cursor:pointer;
  flex-shrink:0; line-height:1; padding:5px; border-radius:50%; transition:background .15s ease, color .15s ease;
  display:inline-flex; align-items:center; justify-content:center;
}
.del-btn:hover{ color:var(--red); background:var(--paper-dark); }

.icon{ width:14px; height:14px; flex-shrink:0; }
.label-icon{ display:inline-flex; margin-right:6px; color:var(--red); vertical-align:-2px; }
.toggle-label{ display:inline-flex; align-items:center; gap:8px; }
.chevron{ display:inline-flex; transition:transform .2s ease; color:var(--ink-soft); margin-left:2px; }
.chevron.open{ transform:rotate(180deg); }
.h2-title{ display:inline-flex; align-items:center; gap:8px; }
</style>
</head>
<body>
<div class="board">

  <div class="card tilt-a">
    <div class="eyebrow"><span id="ticketNo">NO. 001</span><span id="ticketDate">2026.07.08</span></div>
    <div class="header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M4 11a8 8 0 0 0 16 0"/><path d="M4 11h16"/><path d="M9 7l1-2"/><path d="M15 7l-1-2"/><path d="M12 7V4"/></svg></div>
    <h1>오늘 뭐 먹지?</h1>
    <div class="sub">용산 전자상가 맛집 목록 기준. 카테고리 뽑기 or 랜덤 돌림판, 골라보세요.</div>

    <hr class="perf">

    <div class="group-label"><span class="label-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="3" y="7" width="18" height="10" rx="2"/><circle cx="8" cy="12" r="1" fill="currentColor" stroke="none"/></svg></span>카테고리</div>
    <div class="chips" id="catChips"></div>

    <div class="toggle-row">
      <span class="toggle-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><ellipse cx="8" cy="8" rx="3" ry="4"/><ellipse cx="16" cy="16" rx="3" ry="4"/></svg> 가까운 곳만 (도보 10분 이내)</span>
      <div class="switch" id="nearSwitch"></div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabCategory"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg> 카테고리 뽑기</button>
      <button class="tab" id="tabWheel"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/><line x1="18.4" y1="5.6" x2="5.6" y2="18.4"/></svg> 랜덤 돌림판</button>
    </div>

    <div class="panel active" id="panelCategory">
      <button class="draw-btn" id="drawBtn"><svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" width="16" height="16"><path d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8z"/></svg> 메뉴 뽑기</button>
      <div class="result-wrap" id="resultWrap">
        <div class="result">
          <div class="result-label"><svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" width="13" height="13"><path d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8z"/></svg> 오늘의 선택</div>
          <div class="result-name" id="resultName">-</div>
          <div class="result-meta" id="resultMeta"></div>
          <div class="stamp" id="stamp">확정</div>
          <div class="result-actions">
            <button class="reroll" id="rerollBtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/></svg> 다시 뽑기</button>
            <button class="slack-btn" id="slackBtnCat"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 11.5a8.4 8.4 0 0 1-8.4 8.4 8.3 8.3 0 0 1-3.8-.9L3 21l1.9-5.8a8.3 8.3 0 0 1-.9-3.7A8.4 8.4 0 1 1 21 11.5z"/></svg> 슬랙으로 보내기</button>
          </div>
          <div class="slack-status" id="slackStatusCat"></div>
        </div>
      </div>
      <button class="list-toggle" id="listToggle"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg> 필터 결과 목록 보기 (거리순) <span class="chevron" id="listChevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="6 9 12 15 18 9"/></svg></span></button>
      <div class="list-view" id="listView"></div>
    </div>

    <div class="panel" id="panelWheel">
      <div class="wheel-area">
        <div class="wheel-note" id="wheelNote"></div>
        <div class="wheel-wrap">
          <div class="pointer"></div>
          <div class="wheel-hub"></div>
          <div class="wheel" id="wheel"></div>
        </div>
        <button class="draw-btn" id="spinBtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/><line x1="18.4" y1="5.6" x2="5.6" y2="18.4"/></svg> 돌림판 돌리기</button>
      </div>
      <div class="result-wrap" id="resultWrapWheel">
        <div class="result">
          <div class="result-label"><svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" width="13" height="13"><path d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8z"/></svg> 오늘의 선택</div>
          <div class="result-name" id="resultNameWheel">-</div>
          <div class="result-meta" id="resultMetaWheel"></div>
          <div class="stamp" id="stampWheel">확정</div>
          <div class="result-actions">
            <button class="slack-btn" id="slackBtnWheel"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 11.5a8.4 8.4 0 0 1-8.4 8.4 8.3 8.3 0 0 1-3.8-.9L3 21l1.9-5.8a8.3 8.3 0 0 1-.9-3.7A8.4 8.4 0 1 1 21 11.5z"/></svg> 슬랙으로 보내기</button>
          </div>
          <div class="slack-status" id="slackStatusWheel"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card history tilt-b">
    <h2><span class="h2-title"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg> 최근 먹은 곳</span><button class="clear-btn" id="clearBtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><path d="M4 7h16"/><path d="M10 11v6M14 11v6"/><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/><path d="M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/></svg> 기록 지우기</button></h2>
    <div id="histList"></div>
  </div>

  <div class="card manage tilt-b">
    <div class="manage-toggle">
      <button class="toggle-link" id="slackToggle"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M6 8a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 0 0 4 0"/></svg> 슬랙 알림 설정 <span class="chevron" id="slackChevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="6 9 12 15 18 9"/></svg></span></button>
    </div>
    <div class="manage-body" id="slackBody" style="display:none;">

// 슬랙 웹훅처럼 "브라우저(기기)별로만" 저장하고 싶은 값에 사용합니다.
// 맛집 목록/기록은 이제 Firestore(공유 저장소)를 사용합니다.
if(!window.storage){
  window.storage = {
    async get(key){
      const v = localStorage.getItem(key);
      if(v === null) throw new Error('키를 찾을 수 없음: ' + key);
      return { key, value: v, shared: false };
    },
    async set(key, value){
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    },
    async delete(key){
      localStorage.removeItem(key);
      return { key, deleted: true, shared: false };
    },
    async list(prefix){
      const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: false };
    }
  };
}

const PALETTE = ['var(--red)','var(--mustard)','var(--pine)','var(--navy)','var(--brown)','var(--teal)','var(--plum)','var(--slate)'];
function buildCatColorMap(){
  const sorted = [...state.cats].sort((a,b)=>a.localeCompare(b,'ko'));
  const map = {};
  sorted.forEach((c,i)=>{ map[c] = PALETTE[i % PALETTE.length]; });
  state.catColorMap = map;
}
function catColorRaw(cat){
  return (state.catColorMap && state.catColorMap[cat]) || PALETTE[0];
}
function resolveColor(v){
  const el = document.createElement('div');
  el.style.color = v; document.body.appendChild(el);
  const c = getComputedStyle(el).color; document.body.removeChild(el);
  return c;
}
function shuffleArray(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function polarPoint(cx,cy,r,bearingDeg){
  const rad = bearingDeg*Math.PI/180;
  return [cx + r*Math.sin(rad), cy - r*Math.cos(rad)];
}

async function loadRestaurants(){

    DEFAULT_DATA.forEach(r=>{

      batch.set(db.collection('restaurants').doc(id), r);
    });
    await batch.commit();
  }
  watchRestaurants();
}
function watchRestaurants(){
  db.collection('restaurants').onSnapshot(snap=>{
    state.restaurants = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    state.cats = new Set(state.restaurants.map(r=>r.cat));
    buildCatColorMap();
    if(activeCats){
      state.cats.forEach(c=>{ if(!activeCats.has(c)) activeCats.add(c); });
      [...activeCats].forEach(c=>{ if(!state.cats.has(c)) activeCats.delete(c); });

      activeCats = new Set(state.cats);
    }
    renderCatChips();
    renderManageList();
    refreshListView();

  return filtered.length>0 ? filtered : pool;

// ---- Category draw mode ----
let spinningCat = false;
let lastResultCat = null;
function drawCategory(){
  if(spinningCat) return;
  const pool = getDrawPool();
  const resultWrap = document.getElementById('resultWrap');
  const nameEl = document.getElementById('resultName');
  const metaEl = document.getElementById('resultMeta');
  const stampEl = document.getElementById('stamp');

  resultWrap.classList.add('show');
  if(pool.length===0){
    nameEl.textContent = '조건에 맞는 곳 없음';
    metaEl.textContent = '필터를 조금 넓혀보세요';
    stampEl.classList.remove('show');
    return;
  }
  spinningCat = true; btn.disabled = true; stampEl.classList.remove('show');
  let ticks = 0; const maxTicks = 14;
  const iv = setInterval(()=>{
    const r = pool[Math.floor(Math.random()*pool.length)];
    nameEl.textContent = r.name;
    metaEl.textContent = `${r.cat} · ${r.menu} · ${r.dist} · 도보 ${r.walk}분`;
    ticks++;
    if(ticks>=maxTicks){
      clearInterval(iv);
      const final = pool[Math.floor(Math.random()*pool.length)];
      nameEl.textContent = final.name;
      metaEl.textContent = `${final.cat} · ${final.menu} · ${final.dist} · 도보 ${final.walk}분`;
      stampEl.classList.add('show');
      btn.disabled = false; spinningCat = false;
      lastResultCat = final;
      pushHistory(final);
    }
  }, 70);
}

// ---- Wheel mode ----
let wheelRotation = 0;
let wheelPool = [];
function renderWheel(){
  wheelPool = shuffleArray(getPool());
  const wheel = document.getElementById('wheel');
  const note = document.getElementById('wheelNote');
  const n = wheelPool.length;
  note.textContent = n>0 ? `${n}곳 중에서 랜덤 선택` : '조건에 맞는 곳이 없어요';
  document.getElementById('spinBtn').disabled = n===0;
  wheel.innerHTML = '';
  wheel.style.background = 'transparent';
  if(n===0){ wheel.style.background = 'var(--paper-dark)'; return; }

  const cx=150, cy=150, R=140;
  const anglePer = 360/n;
  let svg;
  if(n===1){
    svg = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${resolveColor(catColorRaw(wheelPool[0].cat))}"/>`;
  }else{
    const parts = wheelPool.map((r,i)=>{
      const start = i*anglePer, end = start+anglePer;
      const [x1,y1] = polarPoint(cx,cy,R,start);
      const [x2,y2] = polarPoint(cx,cy,R,end);
      const largeArc = (end-start)>180 ? 1 : 0;
      const fill = resolveColor(catColorRaw(r.cat));
      return `<path d="M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${R} ${R} 0 ${largeArc} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z" fill="${fill}" stroke="#E7E3D6" stroke-width="3"/>`;
    });
    svg = parts.join('');
  }
  wheel.insertAdjacentHTML('afterbegin', `<svg viewBox="0 0 300 300" style="position:absolute;inset:0;width:100%;height:100%;display:block;">${svg}</svg>`);

  const fontSize = Math.max(8, Math.min(12, 13 - n*0.15));
  const labelR = R*0.62;
  wheelPool.forEach((r,i)=>{
    const ci = i*anglePer + anglePer/2;
    const [lx,ly] = polarPoint(cx,cy,labelR,ci);
    const label = document.createElement('div');
    label.className = 'wheel-label';
    label.style.left = (lx/300*100).toFixed(2)+'%';
    label.style.top = (ly/300*100).toFixed(2)+'%';
    const short = r.name.length>5 ? r.name.slice(0,5)+'…' : r.name;
    label.innerHTML = `<span style="font-size:${fontSize}px;">${short}</span>`;
    wheel.appendChild(label);
  });
}

let spinningWheel = false;
let lastResultWheel = null;
function spinWheel(){
  if(spinningWheel || wheelPool.length===0) return;
  spinningWheel = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  document.getElementById('resultWrapWheel').classList.remove('show');
  document.getElementById('stampWheel').classList.remove('show');

  const n = wheelPool.length;
  const anglePer = 360/n;
  const targetIndex = Math.floor(Math.random()*n);
  const ci = targetIndex*anglePer + anglePer/2;
  const desiredMod = (360 - ci) % 360;
  const currentMod = ((wheelRotation % 360) + 360) % 360;
  let delta = desiredMod - currentMod;
  if(delta <= 0) delta += 360;
  const spinsExtra = 4 + Math.floor(Math.random()*2);
  wheelRotation += delta + spinsExtra*360;

  const wheel = document.getElementById('wheel');
  wheel.style.transform = `rotate(${wheelRotation}deg)`;

  setTimeout(()=>{
    const final = wheelPool[targetIndex];
    document.getElementById('resultWrapWheel').classList.add('show');
    document.getElementById('resultNameWheel').textContent = final.name;
    document.getElementById('resultMetaWheel').textContent = `${final.cat} · ${final.menu} · ${final.dist} · 도보 ${final.walk}분`;
    document.getElementById('stampWheel').classList.add('show');
    btn.disabled = false; spinningWheel = false;
    lastResultWheel = final;
    pushHistory(final);
  }, 4150);
}
document.getElementById('spinBtn').onclick = spinWheel;

// ---- Tabs ----
document.getElementById('tabCategory').onclick = ()=>{
  document.getElementById('tabCategory').classList.add('active');
  document.getElementById('tabWheel').classList.remove('active');
  document.getElementById('panelCategory').classList.add('active');
  document.getElementById('panelWheel').classList.remove('active');
};
document.getElementById('tabWheel').onclick = ()=>{
  document.getElementById('tabWheel').classList.add('active');
  document.getElementById('tabCategory').classList.remove('active');
  document.getElementById('panelWheel').classList.add('active');
  document.getElementById('panelCategory').classList.remove('active');
  renderWheel();
};

// ---- Manage panel ----
document.getElementById('manageToggle').onclick = ()=>{
  const body = document.getElementById('manageBody');
  const show = body.style.display === 'none';
  body.style.display = show ? 'block' : 'none';
  document.getElementById('manageChevron').classList.toggle('open', show);
  if(show) renderManageList();
};

function renderManageList(){
  const wrap = document.getElementById('manageList');
  const label = wrap.previousElementSibling;
  if(label) label.textContent = `전체 목록 (${state.restaurants.length}곳)`;
  wrap.innerHTML = '';
  [...state.restaurants].sort((a,b)=>a.cat.localeCompare(b.cat)).forEach(r=>{
    const row = document.createElement('div');
    row.className = 'manage-row';
    row.innerHTML = `<div class="manage-row-main"><span style="color:${catColorRaw(r.cat)}">[${r.cat}]</span> ${r.name}
      <div class="manage-row-meta">${r.menu} · ${r.dist} · 도보 ${r.walk}분</div></div>
      <button class="del-btn">${ICON_TRASH}</button>`;
    row.querySelector('.del-btn').onclick = async ()=>{
      try{ await db.collection('restaurants').doc(r.id).delete(); }
      catch(e){ console.error('삭제 실패', e); }
    };
    wrap.appendChild(row);
  });
}

document.getElementById('addBtn').onclick = async ()=>{
  const errEl = document.getElementById('addError');
  errEl.style.display = 'none';
  const name = document.getElementById('inName').value.trim();
  const cat = document.getElementById('inCat').value.trim();
  const menu = document.getElementById('inMenu').value.trim();
  const walkDigits = document.getElementById('inWalk').value.replace(/[^0-9]/g,'');
  const walk = parseInt(walkDigits, 10);
  const dist = document.getElementById('inDist').value.trim() || '-';
  if(!name || !cat || !walkDigits || isNaN(walk)){
    errEl.textContent = '상호명, 카테고리, 도보(분)은 꼭 입력해주세요. (도보는 숫자만, 예: 11)';
    errEl.style.display = 'block';
    return;
  }
  const id = uid();
  try{
    await db.collection('restaurants').doc(id).set({ name, cat, menu: menu || '-', dist, walk });
  }catch(e){
    errEl.textContent = '저장에 실패했어요. 잠시 후 다시 시도해주세요.';
    errEl.style.display = 'block';
    return;
  }
  document.getElementById('inName').value='';
  document.getElementById('inCat').value='';
  document.getElementById('inMenu').value='';
  document.getElementById('inWalk').value='';
  document.getElementById('inDist').value='';
};

// ---- Slack webhook ----
const CAT_EMOJI = { 한식:"🍚", 중식:"🥡", 일식:"🍣", 양식:"🍝", 분식:"🌶️", 터키:"🥙", 샌드위치:"🥪" };
function catEmoji(cat){ return CAT_EMOJI[cat] || "🍽️"; }

let slackWebhook = '';
async function loadWebhook(){
  try{
    const res = await window.storage.get('slack-webhook', false);
    slackWebhook = res && res.value ? res.value : '';
  }catch(e){ slackWebhook = ''; }
  document.getElementById('inWebhook').value = slackWebhook;
  document.getElementById('webhookSaved').textContent = slackWebhook ? '저장된 웹훅이 있어요.' : '아직 설정된 웹훅이 없어요.';
}
async function saveWebhook(){
  slackWebhook = document.getElementById('inWebhook').value.trim();
  try{ await window.storage.set('slack-webhook', slackWebhook, false); }catch(e){ console.error('저장 실패', e); }
  document.getElementById('webhookSaved').textContent = slackWebhook ? '저장했어요!' : '웹훅을 지웠어요.';
}
document.getElementById('saveWebhookBtn').onclick = saveWebhook;

document.getElementById('slackToggle').onclick = ()=>{
  const body = document.getElementById('slackBody');
  const show = body.style.display === 'none';
  body.style.display = show ? 'block' : 'none';
  document.getElementById('slackChevron').classList.toggle('open', show);
};

async function sendToSlack(r, statusElId, btnEl){
  const statusEl = document.getElementById(statusElId);
  if(!slackWebhook){
    statusEl.textContent = '먼저 아래 "🔔 슬랙 알림 설정"에서 웹훅 URL을 저장해주세요.';
    return;
  }
  const text = `🍴 *오늘 뭐 먹지?*\n*${r.name}* ${catEmoji(r.cat)}\n${r.cat} · ${r.menu}\n📍 ${r.dist} · 도보 ${r.walk}분`;
  btnEl.disabled = true;
  statusEl.textContent = '전송 중...';
  try{
    await fetch(slackWebhook, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ text })
    });
    statusEl.textContent = '슬랙으로 보냈어요! (전송 결과는 슬랙 채널에서 확인해주세요)';
  }catch(e){
    statusEl.textContent = '전송에 실패했어요. 웹훅 URL을 확인해주세요.';
  }
  btnEl.disabled = false;
}

document.getElementById('slackBtnCat').onclick = ()=>{
  if(!lastResultCat) return;
  sendToSlack(lastResultCat, 'slackStatusCat', document.getElementById('slackBtnCat'));
};
document.getElementById('slackBtnWheel').onclick = ()=>{
  if(!lastResultWheel) return;
  sendToSlack(lastResultWheel, 'slackStatusWheel', document.getElementById('slackBtnWheel'));
};

// ---- Init ----
(async function init(){
  await loadWebhook();
  await ensureAuth();
  await loadRestaurants();
  watchHistory();
})();
</script>
